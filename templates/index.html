<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:linear-gradient(90deg,#6366f1,#22c55e);
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:300px 1fr 300px;
    gap:25px;
    padding:25px;
}

.panel{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:12px;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#22c55e;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.student-card{
    background:#020617;
    border-radius:10px;
    padding:25px;
    text-align:center;
    margin-top:20px;
}

.stat{
    background:#020617;
    padding:20px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

.stat h2{
    margin:0;
    color:#22c55e;
}

</style>
</head>

<body>

<div class="header">
Student Performance Dashboard
</div>

<div class="container">

<div class="panel">

<h3>Add Student</h3>

<form id="studentForm">

<label>Name</label>
<input type="text" name="student_name" required>

<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>SAP ID</label>
<input type="text" name="sap_id" maxlength="11" required>

<label>Email</label>
<input type="email" name="gmail" required>

<label>Marks</label>
<input type="number" name="marks" min="0" max="100" required>

<button type="submit">Add Student</button>

</form>

</div>

<div class="panel">

<h3>Student Viewer</h3>

<input type="text" id="searchInput" placeholder="Search student..." onkeyup="filterStudents()">

<select id="studentSelect" onchange="showStudent()">
<option value="">Select student</option>

{% for student in students %}
<option value="{{ student.id }}">{{ student.student_name }}</option>
{% endfor %}

</select>

<div id="studentDisplay" class="student-card">
Select a student to view details
</div>

</div>

<div class="panel">

<h3>Statistics</h3>

<div class="stat">
<h2 id="totalStudents">0</h2>
<p>Total Students</p>
</div>

<div class="stat">
<h2 id="avgMarks">0</h2>
<p>Average Marks</p>
</div>

<div class="stat">
<h2 id="maxMarks">0</h2>
<p>Highest Marks</p>
</div>

<div class="stat">
<h2 id="minMarks">0</h2>
<p>Lowest Marks</p>
</div>

</div>

</div>

<script>

document.getElementById("studentForm").addEventListener("submit",async function(e){

e.preventDefault()

const formData=new FormData(this)

const res=await fetch("/add_student",{method:"POST",body:formData})
const data=await res.json()

if(res.ok){
alert("Student Added")
location.reload()
}else{
alert(data.error)
}

})

async function showStudent(){

const id=document.getElementById("studentSelect").value

if(!id)return

const res=await fetch(`/get_student/${id}`)
const student=await res.json()

document.getElementById("studentDisplay").innerHTML=`
<h2>${student.student_name}</h2>
<p>SAP: ${student.sap_id}</p>
<p>Email: ${student.gmail}</p>
<p>Gender: ${student.gender}</p>
<p>Marks: ${student.marks}</p>
`

}

function filterStudents(){

const input=document.getElementById("searchInput").value.toLowerCase()
const select=document.getElementById("studentSelect")

for(let option of select.options){

if(option.value==="")continue

option.style.display=option.text.toLowerCase().includes(input)?"block":"none"

}

}

async function loadStats(){

const res=await fetch("/student_stats")
const stats=await res.json()

document.getElementById("totalStudents").textContent=stats.total_students
document.getElementById("avgMarks").textContent=stats.avg_marks
document.getElementById("maxMarks").textContent=stats.max_marks
document.getElementById("minMarks").textContent=stats.min_marks

}

loadStats()

</script>

</body>
</html>
